services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: surgery_schedule
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5432:5432"
    volumes:
      - planner-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d surgery_schedule"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  planner-db:
